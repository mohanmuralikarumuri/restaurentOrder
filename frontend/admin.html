<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Admin Panel — Spice Garden</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background:#F3F4F6">

<!-- ═══════════════════════════════════════════
     ADMIN HEADER
════════════════════════════════════════════ -->
<header class="admin-header text-white px-4 py-4 sticky top-0 z-50">
  <div class="flex items-center justify-between max-w-2xl mx-auto">
    <div class="flex items-center gap-3">
      <a href="index.html" class="w-8 h-8 flex items-center justify-center rounded-full bg-white bg-opacity-20 hover:bg-opacity-30 transition">
        <svg width="15" height="15" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>
      <div>
        <h1 class="font-playfair font-bold text-lg">Admin Panel</h1>
        <p class="text-xs" style="color:#D4A853">Spice Garden — Order Manager</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <a href="index.html"
         class="text-xs bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-semibold px-3 py-2 rounded-xl transition flex items-center gap-1">
        🍽 Menu
      </a>
      <button onclick="Auth.logout()"
              class="text-xs bg-white bg-opacity-10 hover:bg-opacity-20 px-3 py-2 rounded-xl transition">
        🚪 Logout
      </button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     STATS STRIP
════════════════════════════════════════════ -->
<div class="max-w-2xl mx-auto px-4 py-4">
  <div class="grid grid-cols-4 gap-3 mb-5">
    <div class="bg-white rounded-xl p-3 text-center shadow-sm">
      <p class="text-xs text-gray-400">Total</p>
      <p class="font-bold text-xl" style="color:#D4A853" id="stat-total">0</p>
    </div>
    <div class="bg-white rounded-xl p-3 text-center shadow-sm">
      <p class="text-xs text-gray-400">Pending</p>
      <p class="font-bold text-xl text-yellow-600" id="stat-pending">0</p>
    </div>
    <div class="bg-white rounded-xl p-3 text-center shadow-sm">
      <p class="text-xs text-gray-400">Cooking</p>
      <p class="font-bold text-xl text-blue-600" id="stat-preparing">0</p>
    </div>
    <div class="bg-white rounded-xl p-3 text-center shadow-sm">
      <p class="text-xs text-gray-400">Done</p>
      <p class="font-bold text-xl text-green-600" id="stat-done">0</p>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="flex gap-2 mb-4 overflow-x-auto pb-1 scrollbar-hide" id="filter-tabs">
    <button class="category-pill active flex-shrink-0" onclick="filterOrders('all', this)">All Orders</button>
    <button class="category-pill flex-shrink-0" onclick="filterOrders('pending', this)">⏳ Pending</button>
    <button class="category-pill flex-shrink-0" onclick="filterOrders('preparing', this)">👨‍🍳 Cooking</button>
    <button class="category-pill flex-shrink-0" onclick="filterOrders('ready', this)">🛵 Out for Delivery</button>
    <button class="category-pill flex-shrink-0" onclick="filterOrders('delivered', this)">✅ Delivered</button>
  </div>

  <!-- Orders list -->
  <div id="orders-list" class="space-y-3 pb-8">
    <!-- Populated by JS -->
  </div>
</div>

<!-- ─ Order Detail Modal ─ -->
<div id="order-modal" class="hidden fixed inset-0 z-50 items-end sm:items-center justify-center p-0 sm:p-4" style="background:rgba(0,0,0,0.5)">
  <div class="bg-white w-full sm:rounded-2xl sm:max-w-md max-h-screen overflow-y-auto" style="border-radius:20px 20px 0 0" id="modal-content">
    <div class="bottom-sheet-handle sm:hidden"></div>
    <div class="px-5 py-4">
      <!-- Header -->
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg" style="color:#1A1A1A">Order Details</h3>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">×</button>
      </div>

      <!-- Content injected by JS -->
      <div id="modal-body"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="app.js"></script>
<script>
  Auth.requireAuth();

  let activeFilter = 'all';

  function renderOrders(filter = 'all') {
    const all = Orders.getAll();
    const filtered = filter === 'all' ? all : all.filter(o => o.status === filter);

    // Stats
    document.getElementById('stat-total').textContent    = all.length;
    document.getElementById('stat-pending').textContent  = all.filter(o => o.status === 'pending').length;
    document.getElementById('stat-preparing').textContent= all.filter(o => o.status === 'preparing').length;
    document.getElementById('stat-done').textContent     = all.filter(o => o.status === 'delivered').length;

    const list = document.getElementById('orders-list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="text-center py-16">
          <div class="text-5xl mb-4">📋</div>
          <p class="font-semibold text-gray-500">${filter === 'all' ? 'No orders yet' : 'No ' + filter + ' orders'}</p>
          <p class="text-xs text-gray-400 mt-1">Orders placed by customers will appear here</p>
          <a href="index.html" class="inline-block mt-5 btn-gold px-6 py-3 text-sm">🍽 Go to Menu →</a>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(order => {
      const statusMap = {
        pending:   { label: 'Pending',           cls: 'pending',   icon: '⏳' },
        preparing: { label: 'Preparing',          cls: 'preparing', icon: '👨‍🍳' },
        ready:     { label: 'Out for Delivery',   cls: 'ready',     icon: '🛵' },
        delivered: { label: 'Delivered',           cls: 'delivered', icon: '✅' },
      };
      const s = statusMap[order.status] || statusMap.pending;

      // Next action button
      const nextActions = {
        pending:   { next: 'preparing', label: '👨‍🍳 Start Cooking' },
        preparing: { next: 'ready',     label: '🛵 Out for Delivery' },
        ready:     { next: 'delivered', label: '✅ Mark Delivered' },
        delivered: null,
      };
      const nextAct = nextActions[order.status];
      const actionBtn = nextAct
        ? `<button onclick="updateStatus('${order.id}','${nextAct.next}',event)"
                   class="text-xs btn-gold px-3 py-1.5">${nextAct.label}</button>`
        : `<span class="text-xs text-gray-400 font-medium">Completed</span>`;

      return `
      <div class="order-card cursor-pointer" onclick="showOrderDetail('${order.id}')">
        <div class="p-4">
          <!-- Top row -->
          <div class="flex items-start justify-between mb-2">
            <div>
              <p class="font-bold text-sm" style="color:#1A1A1A">#${order.id}</p>
              <p class="text-xs text-gray-400 mt-0.5">${Orders.formatDate(order.placedAt)} · ${Orders.formatTime(order.placedAt)}</p>
            </div>
            <span class="status-badge ${s.cls}">${s.icon} ${s.label}</span>
          </div>
          <!-- Customer -->
          <p class="text-xs text-gray-600 mb-1">
            👤 ${order.customer?.name || 'Guest'} · 📱 ${order.customer?.mobile ? '+91 '+order.customer.mobile : '—'}
          </p>
          <!-- Items preview -->
          <p class="text-xs text-gray-400 mb-3 truncate">
            ${order.items.map(i => `${i.emoji} ${i.name} ×${i.qty}`).join(', ')}
          </p>
          <!-- Footer -->
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="font-bold" style="color:#D4A853">₹${order.total}</span>
              <span class="text-xs text-gray-400">· ${order.payment?.toUpperCase()}</span>
            </div>
            ${actionBtn}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function filterOrders(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('#filter-tabs .category-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(filter);
  }

  function updateStatus(orderId, newStatus, e) {
    if (e) e.stopPropagation();
    Orders.updateStatus(orderId, newStatus);
    const labels = { preparing: 'Cooking started', ready: 'Out for delivery!', delivered: 'Order delivered!' };
    Toast.show(labels[newStatus] || 'Status updated', 'success');
    renderOrders(activeFilter);
    // If modal is open for same order, refresh it
    const modalTitle = document.getElementById('modal-body');
    if (modalTitle && !document.getElementById('order-modal').classList.contains('hidden')) {
      const currentId = document.getElementById('order-modal').dataset.orderId;
      if (currentId === orderId) showOrderDetail(orderId);
    }
  }

  function showOrderDetail(orderId) {
    const order = Orders.getById(orderId);
    if (!order) return;
    document.getElementById('order-modal').dataset.orderId = orderId;

    const statusMap = {
      pending:   { label: 'Pending',         cls: 'pending',   icon: '⏳' },
      preparing: { label: 'Preparing',        cls: 'preparing', icon: '👨‍🍳' },
      ready:     { label: 'Out for Delivery', cls: 'ready',     icon: '🛵' },
      delivered: { label: 'Delivered',         cls: 'delivered', icon: '✅' },
    };
    const s = statusMap[order.status] || statusMap.pending;

    const nextActions = {
      pending:   { next: 'preparing', label: '👨‍🍳 Start Cooking',      cls: 'btn-gold' },
      preparing: { next: 'ready',     label: '🛵 Mark Out for Delivery', cls: 'btn-gold' },
      ready:     { next: 'delivered', label: '✅ Mark as Delivered',      cls: 'btn-gold' },
      delivered: null,
    };
    const nextAct = nextActions[order.status];

    document.getElementById('modal-body').innerHTML = `
      <!-- Status badge -->
      <div class="flex items-center gap-2 mb-4">
        <span class="status-badge ${s.cls} text-sm">${s.icon} ${s.label}</span>
        <span class="text-xs text-gray-400">${Orders.formatDate(order.placedAt)} ${Orders.formatTime(order.placedAt)}</span>
      </div>

      <!-- Customer info -->
      <div class="bg-gray-50 rounded-xl p-4 mb-4">
        <p class="text-xs text-gray-400 mb-2 font-semibold uppercase tracking-wide">Customer</p>
        <p class="font-semibold text-sm">${order.customer?.name || '—'}</p>
        <p class="text-xs text-gray-500 mt-0.5">📱 +91 ${order.customer?.mobile || '—'}</p>
        <p class="text-xs text-gray-500 mt-0.5">📍 ${order.customer?.address || '—'}${order.customer?.landmark ? ', ' + order.customer.landmark : ''}</p>
      </div>

      <!-- Items -->
      <div class="mb-4">
        <p class="text-xs text-gray-400 mb-2 font-semibold uppercase tracking-wide">Ordered Items</p>
        <div class="space-y-2">
          ${order.items.map(item => `
            <div class="flex items-center gap-3">
              <span class="text-xl">${item.emoji}</span>
              <div class="flex-1">
                <p class="text-sm font-medium">${item.name}</p>
                <p class="text-xs text-gray-400">Qty: ${item.qty}</p>
              </div>
              <p class="font-semibold text-sm">₹${item.price * item.qty}</p>
            </div>`).join('')}
        </div>
      </div>

      <!-- Bill -->
      <div class="bg-gray-50 rounded-xl p-4 mb-5">
        <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Subtotal</span><span>₹${order.subtotal}</span></div>
        <div class="flex justify-between text-xs text-gray-500 mb-1"><span>Delivery</span><span>${order.deliveryCharge === 0 ? 'FREE' : '₹'+order.deliveryCharge}</span></div>
        <div class="flex justify-between text-sm font-bold mt-2 pt-2 border-t border-gray-200">
          <span>Total</span><span style="color:#D4A853">₹${order.total}</span>
        </div>
        <p class="text-xs text-gray-400 mt-1">Payment: ${order.payment?.toUpperCase()}</p>
      </div>

      <!-- Action -->
      ${nextAct
        ? `<button onclick="updateStatus('${order.id}','${nextAct.next}',event);closeModal()"
                   class="${nextAct.cls} w-full py-3.5 text-sm">${nextAct.label}</button>`
        : `<div class="text-center py-3 text-green-600 font-semibold">✅ Order Completed</div>`}
    `;

    const modal = document.getElementById('order-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function closeModal() {
    const modal = document.getElementById('order-modal');
    modal.classList.remove('flex');
    modal.classList.add('hidden');
  }
  document.getElementById('order-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('order-modal')) closeModal();
  });

  // Live updates
  window.addEventListener('ordersUpdated', () => renderOrders(activeFilter));

  // Initial render
  renderOrders('all');
</script>
</body>
</html>
